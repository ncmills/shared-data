name: Audit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  audit:
    name: Coverage audit (under-tagged / orphaned / starved regression gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npx tsx --test $(find scripts src -name "*.test.ts")

      - name: Run universe + brand-rule verification
        run: npm run verify

      - name: Run coverage audit (fails on new regressions beyond docs/audit-baseline.json)
        run: npm run audit
